<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 860" role="img" aria-label="Euro Trousers MFG Co (FZC)">
  <defs>
    <g id="etmark" fill="currentColor">
      <!-- Euro symbol: open C-ring -->
      <path d="M625,630 A330,330 0 1 1 625,206 L542,275 A222,222 0 1 0 542,561 Z"/>
      <!-- Euro top tail -->
      <path d="M600,212 L792,96 L818,150 L648,258 Z"/>
      <!-- Two horizontal bars -->
      <rect x="120" y="356" width="338" height="60" rx="30"/>
      <rect x="120" y="468" width="338" height="60" rx="30"/>

      <!-- Hanger hook -->
      <path d="M758,150 q-4,-24 15,-24 q17,0 15,17" fill="none" stroke="currentColor" stroke-width="12" stroke-linecap="round"/>
      <!-- Hanger bar (slanted wing) -->
      <path d="M628,312 L760,200 L894,250 L890,272 L760,226 L632,330 Z"/>
      <!-- Waistband -->
      <rect x="655" y="305" width="206" height="48" rx="5"/>
      <!-- Belt loops -->
      <rect x="690" y="296" width="15" height="15"/>
      <rect x="751" y="296" width="15" height="15"/>
      <rect x="812" y="296" width="15" height="15"/>
      <!-- Small waist clip detail -->
      <rect x="820" y="330" width="36" height="13" fill="none" stroke="currentColor" stroke-width="5"/>
      <!-- Trousers (two tapering legs) -->
      <path d="M655,353 H861 L812,720 L786,775 L772,775 L760,560 L748,775 L734,775 L708,720 Z"/>
      <!-- Bottom foot -->
      <rect x="743" y="772" width="30" height="14" rx="3"/>
    </g>
  </defs>

  <!-- Drop shadow -->
  <use href="#etmark" x="16" y="20" style="color:#9a9a9a" opacity="0.45"/>
  <!-- Brand blue mark -->
  <use href="#etmark" style="color:#1a23a0"/>
</svg>
